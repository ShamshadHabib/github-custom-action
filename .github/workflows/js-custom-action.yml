name: Test Custom Action

on:
  workflow_dispatch:
    inputs:
      username: 
        description: Enter the user name
        required: true
        default: World
        type: string
jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run custom action
        id: hello
        uses: ./.github/actions/javascript
        with:
          name: ${{inputs.username}}

      - name: Print output
        run: echo "${{ steps.hello.outputs.message }}"